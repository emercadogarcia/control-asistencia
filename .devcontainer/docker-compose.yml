version: '3.9'
services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: laravel_asistencia
    volumes:
    # Mapea la raíz del proyecto (donde está tu código) al workspace del contenedor
      - ..:/workspace
    environment:
      - APP_ENV=development
    ports:
      - "8000:8000"
      - "5173:5173"
    # Esto mantiene el servidor de Laravel corriendo automáticamente
    command: php artisan serve --host=0.0.0.0 --port=8000
    networks:
      - laravel_net

networks:
  laravel_net:
    driver: bridge