version: '3.9'
services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: laravel_asistencia
    volumes:
      # Usar ${node_modules:-..} o simplemente la ruta relativa al archivo
      - ..:/workspace:cached 
    # Asegúrate de mantener este comando para que el contenedor no se cierre
    command: sleep infinity
    environment:
      - APP_ENV=development
    ports:
      - "8000:8000"
      - "5173:5173"
      - "9003:9003"
    networks:
      - laravel_net

networks:
  laravel_net:
    driver: bridge